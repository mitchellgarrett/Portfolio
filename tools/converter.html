	<script>
		
		function convert() {
			var input = document.getElementById("input").value;
			var output = "";
			
			for (var i = 0; i < input.length; i++) {
				output += parseInt(input[i], 16).toString(2).lpad("0", 4);
				if (i % 2 == 1 && i < input.length - 1) {
					output += " ";
				}
			}
			if(input.length % 2 == 1) {
				output = output.substr(0, output.length - 4) + "0000" + output.substr(-4);
			}
			
			document.getElementById("output").value = output;
		}
		
		function copyOutput() {
			var textField = document.getElementById("output");
			textField.select();
			textField.setSelectionRange(0, 99999); //For mobile devices
			document.execCommand("copy");
		}
		
		String.prototype.lpad = function(pad, length) {
			var str = this;
			while (str.length < length) {
				str = pad + str;
			}
			return str;
		}
		
	</script>
